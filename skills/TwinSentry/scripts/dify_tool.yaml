openapi: 3.0.0
info:
  title: TwinSentry Analysis Agent API
  description: TwinSentry 告警分析 Agent 技能包接口定义规范。用于在 Dify / ChatGPT Custom Actions 等支持 OpenAPI Schema 的平台快速导入。
  version: 1.0.0
servers:
  - url: "http://192.168.0.2:5000"
    description: TwinSentry Core Server

components:
  securitySchemes:
    AgentKeyAuth:
      type: apiKey
      in: header
      name: X-Agent-Key

security:
  - AgentKeyAuth: []

paths:
  /analysis/fetch:
    get:
      summary: 获取待分析告警任务
      description: 从 TwinSentry 原子级安全拉取一条处在待分析状态的告警数据。
      operationId: fetchAnalysisTask
      responses:
        "200":
          description: 成功获取任务
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: object
                    properties:
                      alert:
                        type: object
                        description: 告警详情记录，不存在时返回为空

  /analysis/submit:
    post:
      summary: 提交分析结论
      description: 将 LLM 对告警研判的结果回发给 TwinSentry。
      operationId: submitAnalysisResult
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - alert_id
                - analysis_log
              properties:
                alert_id:
                  type: integer
                  description: "从 fetch 获取到的告警 ID"
                analysis_log:
                  type: string
                  description: "模型研判结论与详细日志"
                enrichment_data:
                  type: object
                  description: "提取的富化数据结构（可选）"
      responses:
        "200":
          description: 提交成功
