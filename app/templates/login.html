<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TwinSentry</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="login-container">
    <div class="login-bg-blob" style="top: 10%; left: 10%;"></div>
    <div class="login-bg-blob" style="bottom: 10%; right: 10%; background: #a78bfa;"></div>

    <div class="card login-card">
        <div class="logo" style="justify-content: center; font-size: 2rem;">
            <i class="fas fa-shield-alt"></i>
            TwinSentry
        </div>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">告警智能分析处置系统</p>

        <form id="login-form">
            <div class="form-group">
                <label>账号</label>
                <input type="text" id="username" class="form-input" placeholder="请输入账号" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" class="form-input" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn">登录</button>
        </form>
        <p id="login-error" style="color: var(--danger); margin-top: 1rem; display: none;">账号或密码错误</p>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const res = await apiRequest('/api/auth/login', 'POST', {
                username: e.target.username.value,
                password: e.target.password.value
            }, false);

            if (res.token) {
                localStorage.setItem('ts_token', res.token);
                localStorage.setItem('ts_user', JSON.stringify(res.user));
                // Set cookie for backend page auth
                document.cookie = `auth_token=${res.token}; path=/; max-age=86400`;
                window.location.href = '/';
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        };
    </script>
</body>

</html>
