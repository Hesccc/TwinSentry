{% extends "base.html" %}

{% block page_title %}告警管理{% endblock %}

{% block content %}
<div class="card table-container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; gap: 0.75rem;">
        <h3>告警管理</h3>
        <div style="display: flex; align-items: center; gap: 0.5rem;">
            <label for="status-filter" style="color: var(--text-muted); font-size: 0.9rem;">状态筛选</label>
            <select id="status-filter" class="form-input" style="width: auto; min-width: 140px;" onchange="loadData()">
                <option value="">全部状态</option>
                <option value="待分析">待分析</option>
                <option value="分析中">分析中</option>
                <option value="已分析">已分析</option>
                <option value="处置中">处置中</option>
                <option value="已处置">已处置</option>
            </select>
            <button id="refresh-btn" class="btn" style="width: auto;" onclick="loadData(true)">刷新数据</button>
            <span id="refresh-status" style="color: var(--text-muted); font-size: 0.8rem;">未刷新</span>
        </div>
    </div>
    <table id="alert-table">
        <thead>
            <tr>
                <th>序号</th>
                <th>ID</th>
                <th>标题</th>
                <th>状态</th>
                <th>采集时间</th>
                <th>修改时间</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="alert-tbody">
            <!-- Data will be loaded here -->
        </tbody>
    </table>
</div>
{% endblock %}

{% block extra_js %}
<script>
    async function loadData(isManual = false) {
        const tbody = document.getElementById('alert-tbody');
        const selectedStatus = document.getElementById('status-filter')?.value || '';
        const refreshBtn = document.getElementById('refresh-btn');
        const refreshStatus = document.getElementById('refresh-status');

        if (isManual) {
            if (refreshBtn) refreshBtn.disabled = true;
            if (refreshStatus) refreshStatus.textContent = '刷新中...';
        }

        try {
            const alerts = await apiRequest('/api/alerts');
            tbody.innerHTML = '';

            const alertList = Array.isArray(alerts) ? alerts : [];
            const filteredAlerts = selectedStatus ? alertList.filter(a => a.status === selectedStatus) : alertList;

            if (!filteredAlerts.length) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: var(--text-muted); padding: 1rem;">当前筛选条件下暂无告警</td></tr>`;
                return;
            }

            filteredAlerts.forEach((a, index) => {
                const row = document.createElement('tr');
                row.style.cursor = 'pointer';
                row.onclick = (e) => {
                    if (e.target.tagName !== 'BUTTON') showDetails(a);
                };

                const canRollback = a.status === '分析中' || a.status === '处置中';
                const rollbackButton = canRollback
                    ? `<button class="btn" style="background: #f59e0b; padding: 4px 8px; font-size: 0.75rem; width: auto; min-width: 64px; margin-right: 6px;" onclick="rollbackAlert(${a.id}, '${a.status}')">回退重试</button>`
                    : '';

                const createdAt = new Date(a.created_at).toLocaleString();
                const updatedAt = new Date(a.updated_at).toLocaleString();

                row.innerHTML = `
                <td>${index + 1}</td>
                <td style="font-weight: 500;">${a.id}</td>
                <td>${a.title}</td>
                <td><span class="status-badge badge-${getStatusKey(a.status)}">${a.status}</span></td>
                <td>${createdAt}</td>
                <td>${updatedAt}</td>
                <td>
                    ${rollbackButton}
                    <button class="btn" style="background: var(--danger); padding: 4px 8px; font-size: 0.75rem; width: auto; min-width: 64px;" onclick="deleteAlert(${a.id})">删除</button>
                </td>
            `;
                tbody.appendChild(row);
            });
        } finally {
            if (isManual) {
                if (refreshBtn) refreshBtn.disabled = false;
                if (refreshStatus) refreshStatus.textContent = `上次刷新：${new Date().toLocaleTimeString()}`;
            }
        }
    }

    function getStatusKey(status) {
        const map = {
            '待分析': 'pending',
            '分析中': 'analyzing',
            '已分析': 'analyzed',
            '处置中': 'processing',
            '已处置': 'processed'
        };
        return map[status] || 'pending';
    }

    function formatCnDateTime(dateStr) {
        if (!dateStr) return '暂无';
        const d = new Date(dateStr);
        if (Number.isNaN(d.getTime())) return '暂无';
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const h = String(d.getHours()).padStart(2, '0');
        const min = String(d.getMinutes()).padStart(2, '0');
        const s = String(d.getSeconds()).padStart(2, '0');
        return `${y}年${m}月${day}日 ${h}:${min}:${s}`;
    }

    async function showDetails(a) {
        const contentHtml = `
        <div style="display: grid; gap: 1rem;">
            <div><strong>告警ID:</strong> ${a.id}</div>
            <div><strong>标题:</strong> ${a.title}</div>
            <div><strong>当前状态:</strong> <span class="status-badge badge-${getStatusKey(a.status)}">${a.status}</span></div>
            <div><strong>采集时间:</strong> ${new Date(a.created_at).toLocaleString()}</div>
            <div><strong>修改时间:</strong> ${new Date(a.updated_at).toLocaleString()}</div>
            <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 0.5rem 0;">
            <div><strong>原始数据:</strong> <pre style="background: #0f172a; padding: 10px; border-radius: 5px; white-space: pre-wrap;">${a.raw_text}</pre></div>
            <div style="border: 1px solid rgba(148, 163, 184, 0.35); border-radius: 8px; padding: 12px; background: rgba(15, 23, 42, 0.35);">
                <strong>解析数据:</strong>
                <ul style="margin: 8px 0 0 20px;">
                    ${a.content.map(i => `<li>${i}</li>`).join('')}
                </ul>
            </div>
            <div style="border: 1px solid rgba(148, 163, 184, 0.35); border-radius: 8px; padding: 12px; background: rgba(15, 23, 42, 0.35);">
                <strong>分析时间:</strong>
                <p style="margin: 8px 0 0 0;">${formatCnDateTime(a.analysis_time)}</p>
                <strong style="display: block; margin-top: 10px;">分析结果:</strong>
                <p style="margin: 8px 0 0 0;">${a.analysis_result || '暂无'}</p>
            </div>
            <div style="border: 1px solid rgba(148, 163, 184, 0.35); border-radius: 8px; padding: 12px; background: rgba(15, 23, 42, 0.35);">
                <strong>处置时间:</strong>
                <p style="margin: 8px 0 0 0;">${formatCnDateTime(a.process_time)}</p>
                <strong style="display: block; margin-top: 10px;">处置结果:</strong>
                <p style="margin: 8px 0 0 0;">${a.process_result || '暂无'}</p>
            </div>
        </div>
    `;
        modal.show('告警详情', contentHtml);
    }

    async function rollbackAlert(id, currentStatus) {
        const targetStatus = currentStatus === '分析中'
            ? '待分析'
            : (currentStatus === '处置中' ? '已分析' : null);

        if (!targetStatus) {
            showFeedback('当前状态不支持回退', 'error');
            return;
        }

        const ok = confirm(`确认回退告警状态吗？\n${currentStatus} -> ${targetStatus}\n（回退用于重试，已有关联结果内容将保留）`);
        if (!ok) return;

        const res = await apiRequest(`/api/alerts/${id}/rollback`, 'POST');
        if (res && res.data) {
            showFeedback('状态回退成功');
            loadData();
        } else {
            showFeedback((res && res.message) ? res.message : '状态回退失败', 'error');
        }
    }

    async function deleteAlert(id) {
        if (confirm('确认是否删除此告警数据？')) {
            const res = await apiRequest(`/api/alerts/${id}`, 'DELETE');
            if (res.message) {
                showFeedback('删除成功');
                loadData();
            }
        }
    }

    document.addEventListener('DOMContentLoaded', loadData);
    // Polling for refresh
    setInterval(loadData, 30000);
</script>
{% endblock %}
